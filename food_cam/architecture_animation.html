<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Food Story — 시스템 아키텍처 애니메이션</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f172a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #e2e8f0;
  }

  h1 {
    font-size: 2rem;
    margin-bottom: 10px;
    color: #f8fafc;
    letter-spacing: 0.05em;
  }

  #subtitle {
    font-size: 1.05rem;
    color: #94a3b8;
    margin-bottom: 24px;
  }

  svg {
    width: 900px;
    height: 560px;
    overflow: visible;
  }

  /* 블록 스타일 */
  .block rect {
    rx: 12; ry: 12;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
  }
  .block text {
    font-family: 'Segoe UI', sans-serif;
    font-size: 15px;
    font-weight: 600;
    text-anchor: middle;
    dominant-baseline: middle;
    fill: #f8fafc;
  }
  .block .sub {
    font-size: 12px;
    font-weight: 400;
    fill: #cbd5e1;
  }

  /* 연결선 */
  .edge {
    fill: none;
    stroke-width: 1.5;
    stroke-dasharray: 6 4;
    opacity: 0.3;
  }

  /* 라벨 */
  .edge-label {
    font-size: 11px;
    fill: #94a3b8;
    text-anchor: middle;
  }

  /* 신호 파티클 */
  .particle {
    r: 5;
    filter: drop-shadow(0 0 6px currentColor);
  }

  /* 범례 */
  .legend text {
    font-size: 13px;
    fill: #94a3b8;
  }

  /* 단계 표시 */
  #scenario-label {
    font-size: 22px;
    font-weight: 800;
    text-anchor: middle;
    dominant-baseline: middle;
  }
  #step-label {
    font-size: 17px;
    font-weight: 700;
    fill: #e2e8f0;
    text-anchor: middle;
  }
  #step-bg {
    fill: #1e293b;
    stroke: #334155;
    stroke-width: 1.5;
    rx: 10; ry: 10;
  }

  /* 버튼 */
  .btn {
    padding: 10px 26px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    margin: 4px;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  #btn-text      { background: #3b82f6; color: white; }
  #btn-image     { background: #8b5cf6; color: white; }
  #btn-recommend { background: #ec4899; color: white; }
  #btn-diary     { background: #10b981; color: white; }
  #btn-stop      { background: #ef4444; color: white; }

  .controls {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
</style>
</head>
<body>

<h1>🍽️ Food Story — 시스템 아키텍처</h1>
<p id="subtitle">블록 간 신호 흐름 애니메이션</p>

<svg id="main-svg" viewBox="0 0 900 560">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- ═══ 연결선 (배경) ═══ -->
  <!-- Flutter ↔ Django -->
  <line class="edge" x1="200" y1="280" x2="420" y2="280" stroke="#3b82f6"/>
  <!-- Django → Naver -->
  <line class="edge" x1="530" y1="235" x2="690" y2="160" stroke="#f59e0b"/>
  <!-- Django → Gemini -->
  <line class="edge" x1="530" y1="265" x2="690" y2="280" stroke="#8b5cf6"/>
  <!-- Django → Wikipedia -->
  <line class="edge" x1="530" y1="295" x2="690" y2="400" stroke="#06b6d4"/>
  <!-- Django → SQLite -->
  <line class="edge" x1="480" y1="360" x2="480" y2="445" stroke="#10b981"/>

  <!-- ═══ 블록 정의 ═══ -->

  <!-- Flutter App -->
  <g class="block" id="b-flutter">
    <rect x="50" y="210" width="150" height="140" fill="#1d4ed8"/>
    <text x="125" y="253">📱 Flutter App</text>
    <text class="sub" x="125" y="271">Android</text>
    <text class="sub" x="125" y="287">텍스트 / 이미지 검색</text>
    <text class="sub" x="125" y="303">일기 저장·조회</text>
    <text class="sub" x="125" y="319">추천 카드 표시</text>
    <text class="sub" x="125" y="335">SNS 카드 만들기</text>
  </g>

  <!-- Django Server -->
  <g class="block" id="b-django">
    <rect x="380" y="200" width="160" height="160" fill="#065f46"/>
    <text x="460" y="245">⚙️ Django Server</text>
    <text class="sub" x="460" y="263">localhost:8000</text>
    <text class="sub" x="460" y="281">/story/{food}/</text>
    <text class="sub" x="460" y="297">/predict/</text>
    <text class="sub" x="460" y="313">/diary/</text>
  </g>

  <!-- Naver API -->
  <g class="block" id="b-naver">
    <rect x="660" y="100" width="150" height="105" fill="#92400e"/>
    <text x="735" y="132">🔍 Naver 검색 API</text>
    <text class="sub" x="735" y="150">웹 문서 검색</text>
    <text class="sub" x="735" y="166">유래·술·이야기·노래</text>
    <text class="sub" x="735" y="182">이미지 검색 (추천)</text>
  </g>

  <!-- Gemini -->
  <g class="block" id="b-gemini">
    <rect x="660" y="240" width="150" height="115" fill="#4c1d95"/>
    <text x="735" y="271">✨ Gemini 2.5 Flash</text>
    <text class="sub" x="735" y="289">이미지 → 음식명</text>
    <text class="sub" x="735" y="305">탭 텍스트 요약</text>
    <text class="sub" x="735" y="321">연관 음식 추천</text>
  </g>

  <!-- Wikipedia -->
  <g class="block" id="b-wiki">
    <rect x="660" y="365" width="150" height="75" fill="#164e63"/>
    <text x="735" y="395">📖 Wikipedia API</text>
    <text class="sub" x="735" y="413">유래 텍스트 수집</text>
  </g>

  <!-- SQLite -->
  <g class="block" id="b-sqlite">
    <rect x="410" y="445" width="120" height="75" fill="#14532d"/>
    <text x="470" y="475">🗄️ SQLite</text>
    <text class="sub" x="470" y="493">일기 데이터 저장</text>
  </g>

  <!-- ═══ 단계 라벨 ═══ -->
  <rect id="step-bg" x="165" y="8" width="570" height="84"/>
  <text id="scenario-label" x="450" y="36" fill="#94a3b8">시나리오를 선택하세요</text>
  <text id="step-label"     x="450" y="72"></text>

  <!-- ═══ 파티클 그룹 (JS가 동적 생성) ═══ -->
  <g id="particles"></g>

</svg>

<div class="controls">
  <button class="btn" id="btn-text"      onclick="runScenario('text')">📝 텍스트 검색</button>
  <button class="btn" id="btn-image"     onclick="runScenario('image')">📷 이미지 검색</button>
  <button class="btn" id="btn-recommend" onclick="runScenario('recommend')">🌟 추천 탭</button>
  <button class="btn" id="btn-diary"     onclick="runScenario('diary')">📖 일기 저장</button>
  <button class="btn" id="btn-stop"      onclick="stopAll()">⏹ 정지</button>
</div>

<script>
const svg = document.getElementById('main-svg');
const particlesGroup = document.getElementById('particles');
const stepLabel = document.getElementById('step-label');
const scenarioLabel = document.getElementById('scenario-label');

let animationTimers = [];

const SCENARIO_META = {
  text:      { label: '📝 텍스트 검색', color: '#60a5fa' },
  image:     { label: '📷 이미지 검색', color: '#a78bfa' },
  recommend: { label: '🌟 추천 탭',    color: '#f472b6' },
  diary:     { label: '📖 일기 저장',  color: '#34d399' },
};

function stopAll() {
  animationTimers.forEach(t => clearTimeout(t));
  animationTimers = [];
  particlesGroup.innerHTML = '';
  scenarioLabel.textContent = '시나리오를 선택하세요';
  scenarioLabel.setAttribute('fill', '#94a3b8');
  stepLabel.textContent = '';
  document.querySelectorAll('.block rect').forEach(r => r.style.filter = '');
}

function delay(fn, ms) {
  const t = setTimeout(fn, ms);
  animationTimers.push(t);
  return t;
}

function highlight(id, on) {
  const el = document.querySelector(`#${id} rect`);
  if (!el) return;
  el.style.filter = on
    ? 'drop-shadow(0 0 16px rgba(255,255,255,0.6)) brightness(1.4)'
    : '';
}

// 두 점 사이의 애니메이션 파티클
function animateParticle(x1, y1, x2, y2, color, duration, onDone) {
  const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  circle.setAttribute('r', '6');
  circle.setAttribute('fill', color);
  circle.setAttribute('cx', x1);
  circle.setAttribute('cy', y1);
  circle.style.filter = `drop-shadow(0 0 8px ${color})`;
  particlesGroup.appendChild(circle);

  const startTime = performance.now();
  function tick(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    const cx = x1 + (x2 - x1) * ease;
    const cy = y1 + (y2 - y1) * ease;
    circle.setAttribute('cx', cx);
    circle.setAttribute('cy', cy);
    circle.setAttribute('opacity', t < 0.9 ? 1 : 1 - (t - 0.9) * 10);
    if (t < 1) {
      requestAnimationFrame(tick);
    } else {
      circle.remove();
      if (onDone) onDone();
    }
  }
  requestAnimationFrame(tick);
}

// 블록 중심 좌표
const centers = {
  flutter: [125, 280],
  django:  [460, 280],
  naver:   [735, 152],
  gemini:  [735, 297],
  wiki:    [735, 402],
  sqlite:  [470, 482],
};

const SPEED = 1200; // ms per segment

function runScenario(type) {
  stopAll();

  const meta = SCENARIO_META[type];
  if (meta) {
    scenarioLabel.textContent = meta.label;
    scenarioLabel.setAttribute('fill', meta.color);
  }

  if (type === 'text') {
    runTextSearch();
  } else if (type === 'image') {
    runImageSearch();
  } else if (type === 'recommend') {
    runRecommendation();
  } else if (type === 'diary') {
    runDiarySave();
  }
}

// ── 시나리오 1: 텍스트 검색 ──
function runTextSearch() {
  const steps = [
    { t:     0, label: '① 사용자가 음식 이름 입력', hl: ['flutter'] },
    { t:  1000, label: '② Flutter → Django: GET /story/비빔밥/',
      particle: ['flutter','django','#3b82f6'] },
    { t:  2400, label: '③ Django → Naver 검색 (병렬 4탭)', hl: ['django','naver'] },
    { t:  2400, particle: ['django','naver','#f59e0b'] },
    { t:  2800, particle: ['django','gemini','#8b5cf6'] },
    { t:  3200, particle: ['django','wiki','#06b6d4'] },
    { t:  4800, label: '④ Naver 검색 결과 → Gemini 요약',
      particle: ['naver','django','#f59e0b'] },
    { t:  5200, particle: ['wiki','django','#06b6d4'] },
    { t:  6400, label: '⑤ Gemini 요약 완료 → Django 응답 조합', hl: ['gemini'] },
    { t:  6400, particle: ['gemini','django','#8b5cf6'] },
    { t:  7800, label: '⑥ Django → Flutter: 5탭 JSON 반환',
      particle: ['django','flutter','#3b82f6'] },
    { t:  9200, label: '✅ 화면에 탭별 스토리 표시', hl: ['flutter'] },
  ];
  runSteps(steps);
}

// ── 시나리오 2: 이미지 검색 ──
function runImageSearch() {
  const steps = [
    { t:     0, label: '① 카메라/갤러리에서 음식 사진 선택', hl: ['flutter'] },
    { t:  1000, label: '② Flutter → Django: POST /predict/ (이미지 업로드)',
      particle: ['flutter','django','#8b5cf6'] },
    { t:  2600, label: '③ Django → Gemini Vision: 음식명 인식 요청',
      particle: ['django','gemini','#8b5cf6'], hl: ['gemini'] },
    { t:  4200, label: '④ Gemini → Django: "비빔밥" 반환',
      particle: ['gemini','django','#a78bfa'] },
    { t:  5600, label: '⑤ Django → Flutter: { food_name: "비빔밥" }',
      particle: ['django','flutter','#8b5cf6'] },
    { t:  7000, label: '⑥ Flutter → Django: GET /story/비빔밥/ (자동 검색)',
      particle: ['flutter','django','#3b82f6'] },
    { t:  8400, label: '⑦ 스토리 검색 파이프라인 실행',
      particle: ['django','naver','#f59e0b'] },
    { t:  8800, particle: ['django','wiki','#06b6d4'] },
    { t: 10000, particle: ['naver','django','#f59e0b'] },
    { t: 10400, particle: ['wiki','django','#06b6d4'] },
    { t: 11200, label: '⑧ Gemini 요약 적용',
      particle: ['django','gemini','#8b5cf6'] },
    { t: 12400, particle: ['gemini','django','#8b5cf6'] },
    { t: 13600, label: '⑨ 최종 결과 → Flutter 화면 표시',
      particle: ['django','flutter','#3b82f6'], hl: ['flutter'] },
    { t: 15000, label: '✅ 이미지 → 음식명 → 스토리 완료', hl: ['flutter'] },
  ];
  runSteps(steps);
}

// ── 시나리오 3: 추천 탭 ──
function runRecommendation() {
  const steps = [
    { t:     0, label: '① 추천 탭 선택', hl: ['flutter'] },
    { t:  1000, label: '② Flutter → Django: 추천 탭 포함 스토리 요청',
      particle: ['flutter','django','#ec4899'] },
    { t:  2600, label: '③ Django → Gemini: 연관 음식 3개 JSON 요청',
      particle: ['django','gemini','#ec4899'], hl: ['gemini'] },
    { t:  4200, label: '④ Gemini → Django: ["잡채","된장찌개","김치전"]',
      particle: ['gemini','django','#f0abfc'] },
    { t:  5600, label: '⑤ Django → Naver 이미지 검색 ×3 (병렬)',
      particle: ['django','naver','#f59e0b'], hl: ['naver'] },
    { t:  6200, particle: ['django','naver','#f59e0b'] },
    { t:  6800, particle: ['django','naver','#f59e0b'] },
    { t:  8000, label: '⑥ Naver → Django: 음식 사진 URL 반환',
      particle: ['naver','django','#fcd34d'] },
    { t:  8600, particle: ['naver','django','#fcd34d'] },
    { t:  9200, particle: ['naver','django','#fcd34d'] },
    { t: 10400, label: '⑦ Django → Flutter: 추천 카드 3장 반환',
      particle: ['django','flutter','#ec4899'] },
    { t: 12000, label: '✅ 음식 사진 + 설명 카드 3개 표시', hl: ['flutter'] },
  ];
  runSteps(steps);
}

// ── 시나리오 4: 일기 저장 ──
function runDiarySave() {
  const steps = [
    { t:     0, label: '① 스토리 화면에서 일기 저장 버튼 탭', hl: ['flutter'] },
    { t:  1200, label: '② 날짜 자동 입력 + 장소 입력', hl: ['flutter'] },
    { t:  2600, label: '③ Flutter → Django: POST /diary/',
      particle: ['flutter','django','#10b981'] },
    { t:  4000, label: '④ Django → SQLite: 일기 데이터 저장',
      particle: ['django','sqlite','#10b981'], hl: ['sqlite'] },
    { t:  5400, label: '⑤ Django → Flutter: { id: 201 } 응답',
      particle: ['django','flutter','#10b981'] },
    { t:  6800, label: '⑥ 저장 완료 다이얼로그 표시', hl: ['flutter'] },
    { t:  8400, label: '⑦ 일기 목록 조회: GET /diary/',
      particle: ['flutter','django','#10b981'] },
    { t:  9800, label: '⑧ Django → SQLite 조회',
      particle: ['django','sqlite','#10b981'] },
    { t: 11000, particle: ['sqlite','django','#34d399'] },
    { t: 12200, label: '⑨ 전체 일기 목록 → Flutter',
      particle: ['django','flutter','#10b981'] },
    { t: 13600, label: '✅ 일기 목록 화면 표시', hl: ['flutter'] },
  ];
  runSteps(steps);
}

function runSteps(steps) {
  // 하이라이트 초기화
  Object.keys(centers).forEach(k => highlight(`b-${k}`, false));

  steps.forEach(step => {
    if (step.label) {
      delay(() => { stepLabel.textContent = step.label; }, step.t);
    }
    if (step.hl) {
      step.hl.forEach(id => {
        delay(() => highlight(`b-${id}`, true), step.t);
        delay(() => highlight(`b-${id}`, false), step.t + SPEED + 200);
      });
    }
    if (step.particle) {
      const [from, to, color] = step.particle;
      const [x1, y1] = centers[from];
      const [x2, y2] = centers[to];
      delay(() => animateParticle(x1, y1, x2, y2, color, SPEED), step.t);
    }
  });

  // 마지막 단계 후 종료
  const maxT = Math.max(...steps.map(s => s.t)) + SPEED + 800;
  delay(() => {
    Object.keys(centers).forEach(k => highlight(`b-${k}`, false));
  }, maxT);
}
</script>
</body>
</html>
